<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Filmix</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --blue:#2563eb;--blue-dark:#1d4ed8;--blue-glow:rgba(37,99,235,.4);
  --bg:#0a0a0a;--bg2:#0f0f0f;--bg3:#161616;--bg4:#1e1e1e;
  --surface:rgba(255,255,255,.04);--border:rgba(255,255,255,.07);
  --text:#f0f0f0;--muted:#777;--dim:#3a3a3a;
  --nav:68px;--r:10px;--rl:16px;
  --fb:'DM Sans',sans-serif;--fm:'DM Mono',monospace;
  --t:.22s cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--fb);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
a{color:inherit;text-decoration:none}
button{cursor:pointer;border:none;background:none;color:inherit;font-family:inherit}
img{display:block;max-width:100%}
input{font-family:inherit}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--blue)}

@keyframes shimmer{0%{background-position:-800px 0}100%{background-position:800px 0}}
.sk{background:linear-gradient(90deg,var(--bg4) 25%,rgba(255,255,255,.06) 50%,var(--bg4) 75%);background-size:800px 100%;animation:shimmer 1.5s infinite;border-radius:6px}

.navbar{position:fixed;top:0;left:0;right:0;z-index:900;transition:background var(--t),backdrop-filter var(--t)}
.navbar.scrolled{background:rgba(10,10,10,.97);backdrop-filter:blur(24px);border-bottom:1px solid var(--border)}
.nav-inner{display:flex;align-items:center;gap:24px;padding:0 40px;height:var(--nav)}
.logo-img{height:32px;width:auto;object-fit:contain;flex-shrink:0}
.nav-links{display:flex;gap:2px;flex:1}
.nav-link{padding:6px 14px;border-radius:7px;font-size:14px;font-weight:500;color:var(--muted);transition:all var(--t)}
.nav-link:hover,.nav-link.active{color:var(--text);background:var(--surface)}
.nav-link.active{color:var(--blue)}
.nav-right{display:flex;align-items:center;gap:10px;margin-left:auto}
.icon-btn{width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all var(--t)}
.icon-btn:hover{background:var(--surface);color:var(--text)}
.btn-blue{padding:8px 20px;background:var(--blue);color:#fff;font-size:14px;font-weight:600;border-radius:8px;transition:all var(--t);white-space:nowrap}
.btn-blue:hover{background:var(--blue-dark);transform:translateY(-1px)}
.hamburger{display:none;flex-direction:column;gap:5px;padding:8px}
.hamburger span{display:block;width:22px;height:2px;background:var(--text);border-radius:2px}

.u-avatar{position:relative;cursor:pointer;display:none;align-items:center}
.u-avatar img{width:36px;height:36px;border-radius:50%;object-fit:cover;border:2px solid var(--blue)}
.u-drop{position:absolute;top:calc(100% + 12px);right:0;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);width:200px;padding:8px;opacity:0;pointer-events:none;transform:translateY(-8px);transition:all var(--t)}
.u-avatar:hover .u-drop{opacity:1;pointer-events:all;transform:translateY(0)}
.u-drop-head{padding:8px 12px 12px;border-bottom:1px solid var(--border);margin-bottom:8px}
.u-drop-name{display:block;font-weight:600;font-size:14px}
.u-drop-email{font-size:12px;color:var(--muted);margin-top:2px;display:block}
.u-drop-item{display:block;width:100%;text-align:left;padding:8px 12px;border-radius:6px;font-size:14px;color:var(--muted);transition:all var(--t)}
.u-drop-item:hover{background:var(--surface);color:var(--blue)}

.srch-wrap{background:rgba(10,10,10,.98);backdrop-filter:blur(20px);padding:12px 40px 16px;border-top:1px solid var(--border);transform:translateY(-100%);opacity:0;transition:all .3s cubic-bezier(.4,0,.2,1);pointer-events:none;position:relative;z-index:899}
.srch-wrap.open{transform:translateY(0);opacity:1;pointer-events:all}
.srch-box{display:flex;align-items:center;gap:12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:10px 16px;transition:border-color var(--t)}
.srch-box:focus-within{border-color:var(--blue)}
.srch-box svg{color:var(--muted);flex-shrink:0}
.srch-box input{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:15px}
.srch-box input::placeholder{color:var(--dim)}
.srch-close{color:var(--muted);font-size:16px;padding:4px;transition:color var(--t)}.srch-close:hover{color:var(--blue)}
.srch-res{margin-top:12px;max-height:400px;overflow-y:auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px}

.sb-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:950;opacity:0;pointer-events:none;transition:opacity var(--t);backdrop-filter:blur(4px)}
.sb-overlay.open{opacity:1;pointer-events:all}
.sidebar{position:fixed;top:0;right:0;width:280px;height:100%;background:var(--bg2);border-left:1px solid var(--border);z-index:1000;padding:24px 20px;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
.sidebar.open{transform:translateX(0)}
.sb-close{align-self:flex-end;font-size:20px;color:var(--muted);padding:4px;transition:color var(--t)}.sb-close:hover{color:var(--blue)}
.sb-logo{margin:16px 0 28px}.sb-logo img{height:28px;width:auto}
.sb-nav{display:flex;flex-direction:column;gap:4px}
.sb-link{display:block;padding:12px 16px;border-radius:var(--r);font-size:15px;color:var(--muted);transition:all var(--t)}
.sb-link:hover,.sb-link.active{background:var(--surface);color:var(--text)}.sb-link.active{color:var(--blue)}
.sb-bottom{margin-top:auto}

.section{display:none}.section.active{display:block}

.hero{position:relative;height:90vh;min-height:500px;max-height:880px;overflow:hidden}
.hero-bg{position:absolute;inset:0;background-size:cover;background-position:center top;transform:scale(1.04);transition:background-image 1s ease}
.hero-ov{position:absolute;inset:0;background:linear-gradient(to right,rgba(10,10,10,.97) 0%,rgba(10,10,10,.7) 45%,rgba(10,10,10,.2) 75%,transparent 100%),linear-gradient(to top,var(--bg) 0%,transparent 45%)}
.hero-content{position:relative;z-index:2;padding:calc(var(--nav) + 90px) 64px 60px;max-width:620px}
.hero-badge{display:inline-flex;align-items:center;gap:6px;background:var(--blue);color:#fff;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:4px 10px;border-radius:4px;margin-bottom:18px}
.hero-title{font-size:clamp(40px,6.5vw,78px);font-weight:700;line-height:1.0;letter-spacing:-1px;margin-bottom:18px;text-shadow:0 2px 40px rgba(0,0,0,.8)}
.hero-meta{display:flex;align-items:center;gap:16px;margin-bottom:14px;flex-wrap:wrap}
.hero-meta span{font-size:13px;color:var(--muted)}
.hero-rating{color:#f5c518!important;font-weight:700;font-size:15px!important}
.hero-desc{font-size:15px;line-height:1.7;color:rgba(255,255,255,.68);margin-bottom:28px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.hero-actions{display:flex;gap:12px;flex-wrap:wrap}
.hero-btn{display:flex;align-items:center;gap:8px;padding:13px 28px;border-radius:var(--r);font-size:15px;font-weight:600;transition:all var(--t)}
.hero-btn.p{background:var(--blue);color:#fff}.hero-btn.p:hover{background:var(--blue-dark);transform:translateY(-2px);box-shadow:0 8px 32px var(--blue-glow)}
.hero-btn.s{background:rgba(255,255,255,.1);color:#fff;backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.15)}.hero-btn.s:hover{background:rgba(255,255,255,.18);transform:translateY(-2px)}
.hero-dots{position:absolute;bottom:84px;left:64px;z-index:3;display:flex;gap:8px}
.h-dot{width:6px;height:6px;border-radius:3px;background:rgba(255,255,255,.25);cursor:pointer;transition:all .4s ease}
.h-dot.active{width:26px;background:var(--blue)}

.cat-wrap{padding:0 0 80px;position:relative;z-index:2}
.cat-row{margin-bottom:44px;padding:0 40px}
.row-hd{margin-bottom:16px}
.row-title{font-size:18px;font-weight:700;letter-spacing:-.2px;display:flex;align-items:center;gap:10px}
.row-title::before{content:'';display:block;width:3px;height:18px;background:var(--blue);border-radius:2px}
.row-scroll{display:flex;gap:14px;overflow-x:auto;padding-bottom:12px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.row-scroll::-webkit-scrollbar{display:none}

.mcard{flex-shrink:0;width:160px;scroll-snap-align:start;cursor:pointer;border-radius:var(--r);overflow:hidden;position:relative;transition:transform var(--t)}
.mcard:hover{transform:translateY(-7px) scale(1.03)}
.mcard:hover .card-ov,.mcard:hover .card-info{opacity:1}
.mcard:hover .card-info{transform:translateY(0)}
.mcard:hover .fav-btn{opacity:1}
.card-img{width:100%;aspect-ratio:2/3;object-fit:cover;background:var(--bg4);display:block}
.card-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.94) 40%,transparent 100%);opacity:0;transition:opacity var(--t)}
.card-info{position:absolute;bottom:0;left:0;right:0;padding:12px 10px 10px;transform:translateY(8px);opacity:0;transition:all var(--t)}
.card-name{font-size:12px;font-weight:600;line-height:1.3;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-meta2{display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--muted)}
.card-star{color:#f5c518;font-weight:700}
.fav-btn{position:absolute;top:8px;right:8px;width:30px;height:30px;border-radius:50%;background:rgba(0,0,0,.72);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;font-size:13px;opacity:0;transition:all var(--t);z-index:5}
.fav-btn:hover{background:var(--blue);transform:scale(1.1)}.fav-btn.on{opacity:1}
.sk-poster{width:160px;flex-shrink:0;aspect-ratio:2/3;border-radius:var(--r)}

.sec-hd{padding:calc(var(--nav) + 36px) 40px 24px}
.sec-title{font-size:28px;font-weight:700;letter-spacing:-.5px;margin-bottom:18px}
.filters{display:flex;gap:8px;flex-wrap:wrap}
.f-btn{padding:7px 16px;border-radius:20px;font-size:13px;font-weight:500;border:1px solid var(--border);color:var(--muted);background:var(--surface);transition:all var(--t)}
.f-btn:hover{border-color:var(--blue);color:var(--text)}.f-btn.active{background:var(--blue);border-color:var(--blue);color:#fff}
.mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:16px;padding:0 40px 40px}
.mgrid .mcard{width:100%}
.load-btn{display:block;margin:0 auto 60px;padding:12px 36px;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:var(--r);font-size:14px;font-weight:600;transition:all var(--t)}
.load-btn:hover{border-color:var(--blue);color:var(--blue)}

.wlist{display:flex;flex-direction:column;gap:12px;padding:0 40px 60px}
.wcard{display:flex;align-items:center;gap:16px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rl);padding:12px;cursor:pointer;transition:all var(--t)}
.wcard:hover{border-color:var(--blue);background:var(--bg4)}
.w-poster{width:80px;height:120px;border-radius:8px;object-fit:cover;flex-shrink:0;background:var(--bg4)}
.w-info{flex:1;min-width:0}
.w-title{font-size:16px;font-weight:600;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.w-meta{font-size:13px;color:var(--muted);margin-bottom:10px}
.w-bar-wrap{display:flex;align-items:center;gap:10px}
.w-bar{flex:1;height:3px;background:var(--bg4);border-radius:2px;overflow:hidden}
.w-bar-fill{height:100%;background:var(--blue)}
.w-pct{font-size:12px;color:var(--muted);font-family:var(--fm);flex-shrink:0}
.w-play{width:44px;height:44px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;transition:all var(--t)}
.wcard:hover .w-play{transform:scale(1.08);box-shadow:0 4px 20px var(--blue-glow)}

.empty{text-align:center;padding:80px 40px;color:var(--muted)}
.empty-ico{font-size:52px;margin-bottom:16px}
.empty p{font-size:16px;font-weight:500;margin-bottom:8px}
.empty-sub{font-size:14px;color:var(--dim)}

/* MODAIS */
.modal-ov{position:fixed;inset:0;z-index:1100;background:rgba(0,0,0,.92);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;padding:20px 16px;opacity:0;pointer-events:none;transition:opacity .3s ease}
.modal-ov.open{opacity:1;pointer-events:all}
.modal-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);width:100%;max-width:900px;max-height:94vh;overflow-y:auto;position:relative;transform:translateY(20px) scale(.97);transition:all .3s cubic-bezier(.4,0,.2,1)}
.modal-ov.open .modal-box{transform:translateY(0) scale(1)}
.m-close{position:absolute;top:14px;right:14px;z-index:20;width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);color:var(--text);font-size:16px;display:flex;align-items:center;justify-content:center;transition:all var(--t)}
.m-close:hover{background:var(--blue);transform:rotate(90deg)}

/* PLAYER MODAL — tela cheia com player */
.player-modal .modal-box{max-width:1100px;background:#000;border-color:rgba(255,255,255,.05)}
.player-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:rgba(0,0,0,.9);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
.player-title{font-size:15px;font-weight:600;color:var(--text)}
.player-sources{display:flex;gap:8px;flex-wrap:wrap;padding:12px 20px;background:var(--bg3);border-bottom:1px solid var(--border)}
.src-btn{padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;border:1px solid var(--border);color:var(--muted);background:var(--surface);transition:all var(--t);cursor:pointer}
.src-btn:hover{border-color:var(--blue);color:var(--text)}
.src-btn.active{background:var(--blue);border-color:var(--blue);color:#fff}
.player-wrap{position:relative;width:100%;padding-bottom:56.25%;background:#000}
.player-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:none}
.player-error{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--muted);text-align:center;padding:20px}
.player-error p{font-size:14px;line-height:1.6}
.player-error strong{color:var(--text);display:block;font-size:16px;margin-bottom:4px}
.src-try-btn{padding:8px 20px;background:var(--blue);color:#fff;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all var(--t)}
.src-try-btn:hover{background:var(--blue-dark)}
.player-info{padding:20px;border-top:1px solid var(--border)}
.player-info-title{font-size:18px;font-weight:700;margin-bottom:6px}
.player-info-meta{font-size:13px;color:var(--muted);display:flex;gap:14px;flex-wrap:wrap}
.player-save-btn{margin-top:14px;padding:9px 20px;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all var(--t);display:inline-flex;align-items:center;gap:8px}
.player-save-btn:hover{border-color:var(--blue);color:var(--blue)}

/* MOVIE MODAL */
.m-backdrop{position:relative;height:300px;overflow:hidden;border-radius:var(--rl) var(--rl) 0 0}
.m-backdrop img{width:100%;height:100%;object-fit:cover;object-position:center top}
.m-back-ov{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 25%,var(--bg2) 100%)}
.m-body{padding:24px 32px 32px}
.m-head{display:flex;gap:24px;margin-top:-80px;position:relative;z-index:2;margin-bottom:24px}
.m-poster{width:120px;height:180px;border-radius:var(--r);object-fit:cover;flex-shrink:0;box-shadow:0 8px 40px rgba(0,0,0,.8);border:2px solid var(--border)}
.m-head-info{flex:1;padding-top:42px;min-width:0}
.m-title{font-size:clamp(22px,4vw,36px);font-weight:700;letter-spacing:-.5px;line-height:1.1;margin-bottom:10px}
.m-meta{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:12px}
.m-meta span{font-size:13px;color:var(--muted)}
.m-rating{color:#f5c518!important;font-weight:700;font-size:15px!important}
.m-genres{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.g-tag{padding:4px 12px;border-radius:20px;border:1px solid var(--border);font-size:12px;color:var(--muted);background:var(--surface)}
.m-acts{display:flex;gap:10px;flex-wrap:wrap}
.m-btn{display:flex;align-items:center;gap:8px;padding:10px 22px;border-radius:var(--r);font-size:14px;font-weight:600;transition:all var(--t);cursor:pointer}
.m-btn.p{background:var(--blue);color:#fff;border:none}.m-btn.p:hover{background:var(--blue-dark);box-shadow:0 4px 20px var(--blue-glow);transform:translateY(-1px)}
.m-btn.s{background:var(--surface);border:1px solid var(--border);color:var(--text)}.m-btn.s:hover{border-color:var(--blue);color:var(--blue)}
.m-btn.s.on{color:var(--blue);border-color:var(--blue)}
.m-overview{font-size:15px;line-height:1.72;color:rgba(255,255,255,.68);margin-bottom:28px;border-left:3px solid var(--blue);padding-left:16px}
.m-sec{font-size:16px;font-weight:700;margin-bottom:14px;color:var(--muted)}
.cast-scroll{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px;margin-bottom:28px;scrollbar-width:none}
.cast-scroll::-webkit-scrollbar{display:none}
.cast-card{flex-shrink:0;width:88px;text-align:center}
.cast-photo{width:68px;height:68px;border-radius:50%;object-fit:cover;background:var(--bg4);margin:0 auto 8px;border:2px solid var(--border)}
.cast-name{font-size:11px;font-weight:600;line-height:1.3}
.cast-char{font-size:10px;color:var(--muted);line-height:1.3}
.sim-scroll{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none}
.sim-scroll::-webkit-scrollbar{display:none}

.auth-box{max-width:420px!important}
.auth-inner{padding:36px}
.auth-logo{margin:0 auto 8px;display:flex;justify-content:center}
.auth-logo img{height:38px;width:auto}
.auth-sub{text-align:center;font-size:13px;color:var(--muted);margin-bottom:28px}
.auth-tabs{display:flex;background:var(--bg3);border-radius:var(--r);padding:4px;margin-bottom:24px}
.a-tab{flex:1;padding:8px;border-radius:7px;font-size:14px;font-weight:600;color:var(--muted);transition:all var(--t)}
.a-tab.active{background:var(--blue);color:#fff}
.a-form{display:flex;flex-direction:column;gap:12px}
.a-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:12px 16px;color:var(--text);font-size:14px;outline:none;transition:border-color var(--t)}
.a-input:focus{border-color:var(--blue)}.a-input::placeholder{color:var(--dim)}
.a-submit{width:100%;padding:13px;background:var(--blue);color:#fff;font-size:15px;font-weight:700;border-radius:var(--r);transition:all var(--t);margin-top:4px;cursor:pointer;border:none}
.a-submit:hover{background:var(--blue-dark);transform:translateY(-1px);box-shadow:0 4px 20px var(--blue-glow)}
.a-submit:disabled{opacity:.6;transform:none;box-shadow:none;cursor:not-allowed}
.a-err{font-size:13px;color:#f87171;text-align:center;min-height:18px}

.loading-screen{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;transition:opacity .6s ease}
.loading-screen.hide{opacity:0;pointer-events:none}
.loading-screen img{height:44px;width:auto}
.loading-bar{width:180px;height:2px;background:var(--bg4);border-radius:2px;overflow:hidden}
.loading-bar-fill{height:100%;background:var(--blue);border-radius:2px;animation:lb 1.6s ease-in-out infinite}
@keyframes lb{0%{width:0%;margin-left:0}50%{width:70%;margin-left:0}100%{width:0%;margin-left:100%}}

.toast-wrap{position:fixed;bottom:28px;right:28px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
@keyframes tIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes tOut{from{opacity:1}to{opacity:0;transform:translateX(20px)}}
.toast{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:11px 18px;font-size:14px;animation:tIn .28s ease forwards;pointer-events:all;max-width:300px;backdrop-filter:blur(10px)}

}

  .btn-blue{display:none}
}
