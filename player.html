<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Filmix Player</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#000;color:#fff;font-family:sans-serif}
body{display:flex;flex-direction:column}

.top{display:flex;align-items:center;gap:12px;padding:10px 16px;background:#0a0a0a;border-bottom:1px solid #1a1a1a;flex-shrink:0}
.back{display:flex;align-items:center;gap:6px;padding:7px 14px;background:#1e1e1e;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}
.back:hover{background:#2563eb}
.logo{font-size:18px;font-weight:700;letter-spacing:2px}.logo span{color:#2563eb}
.ttl{font-size:13px;color:#aaa;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Seletor de fonte */
.src-bar{display:flex;gap:0;background:#0d0d0d;border-bottom:1px solid #161616;flex-shrink:0;overflow-x:auto;scrollbar-width:none}
.src-bar::-webkit-scrollbar{display:none}
.src-btn{flex-shrink:0;padding:10px 16px;font-size:12px;font-weight:600;color:#555;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:.15s;white-space:nowrap}
.src-btn:hover{color:#fff}.src-btn.on{color:#2563eb;border-bottom-color:#2563eb}

/* PLAYER AREA */
.pw{flex:1;position:relative;background:#000;overflow:hidden}

/* O iframe ocupa 100% — sem pointer-events manipulation */
#fr{position:absolute;inset:0;width:100%;height:100%;border:none}

/* Camada de loading sobre o iframe */
.ld{position:absolute;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:5;transition:opacity .5s}
.ld.off{opacity:0;pointer-events:none}
.spin{width:44px;height:44px;border-radius:50%;border:3px solid #1e1e1e;border-top-color:#2563eb;animation:s .9s linear infinite}
@keyframes s{to{transform:rotate(360deg)}}
.ld-t{font-size:14px;font-weight:600;color:#ccc}
.ld-s{font-size:12px;color:#444;text-align:center;line-height:1.5}
.retry{margin-top:6px;padding:8px 20px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}
.retry:hover{background:#1d4ed8}
</style>
</head>
<body>
<div class="top">
  <button class="back" onclick="history.back()">← Voltar</button>
  <div class="logo"><span>F</span>ILMIX</div>
  <span class="ttl" id="ttl"></span>
</div>

<div class="src-bar" id="srcBar"></div>

<div class="pw">
  <div class="ld" id="ld">
    <div class="spin"></div>
    <div class="ld-t" id="ldT">Carregando…</div>
    <div class="ld-s" id="ldS">Aguarde enquanto conectamos ao servidor</div>
  </div>
  <iframe id="fr"
    allowfullscreen
    allow="autoplay; fullscreen; picture-in-picture; encrypted-media; gyroscope; accelerometer; clipboard-write"
    referrerpolicy="no-referrer"
    sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-presentation allow-top-navigation-by-user-activation allow-modals allow-pointer-lock">
  </iframe>
</div>

<script>
const q     = new URLSearchParams(location.search);
const ID    = q.get('id')    || '';
const TYPE  = q.get('type')  || 'movie';
const SEA   = q.get('sea')   || '1';
const EP    = q.get('ep')    || '1';
const TITLE = q.get('title') || '';

document.getElementById('ttl').textContent = TITLE;
document.title = '▶ ' + TITLE + ' — Filmix';

/* ── FONTES ─────────────────────────────────────────────
   Ordem testada: as mais permissivas primeiro.
   Para séries/animes usa endpoints específicos de TV.
──────────────────────────────────────────────────────── */
function urls(id, type, sea, ep) {
  if (type === 'tv') return [
    `https://vidsrc.xyz/embed/tv?tmdb=${id}&season=${sea}&episode=${ep}`,
    `https://vidsrc.to/embed/tv/${id}/${sea}/${ep}`,
    `https://vidsrc.me/embed/tv?tmdb=${id}&season=${sea}&episode=${ep}`,
    `https://multiembed.mov/?video_id=${id}&tmdb=1&s=${sea}&e=${ep}`,
    `https://autoembed.co/tv/tmdb/${id}-${sea}-${ep}`,
    `https://embed.su/embed/tv/${id}/${sea}/${ep}`,
    `https://www.2embed.cc/embedtvfull/${id}&s=${sea}&e=${ep}`,
  ];
  return [
    `https://vidsrc.xyz/embed/movie?tmdb=${id}`,
    `https://vidsrc.to/embed/movie/${id}`,
    `https://vidsrc.me/embed/movie?tmdb=${id}`,
    `https://multiembed.mov/?video_id=${id}&tmdb=1`,
    `https://autoembed.co/movie/tmdb/${id}`,
    `https://embed.su/embed/movie/${id}`,
    `https://www.2embed.cc/embed/${id}`,
  ];
}

const SRCS   = urls(ID, TYPE, SEA, EP);
const LABELS = ['VidSrc','VidSrc 2','VidSrc.me','MultiEmbed','AutoEmbed','Embed.su','2Embed'];

const fr    = document.getElementById('fr');
const ld    = document.getElementById('ld');
const ldT   = document.getElementById('ldT');
const ldS   = document.getElementById('ldS');
const bar   = document.getElementById('srcBar');

let cur = 0, timer = null, checking = false;

/* ── Barra de fontes ─────────────────────────────────── */
bar.innerHTML = SRCS.map((_, i) =>
  `<button class="src-btn ${i===0?'on':''}" id="b${i}" onclick="load(${i})">${LABELS[i]||'Fonte '+(i+1)}</button>`
).join('');

/* ── Anti popup ──────────────────────────────────────── */
window.open = () => null;
window.addEventListener('blur', () => { if (!checking) setTimeout(() => window.focus?.(), 50); });

/* ── Carrega fonte ───────────────────────────────────── */
function load(i) {
  if (i >= SRCS.length) { fail(); return; }
  cur = i;
  clearTimeout(timer);
  checking = false;

  // UI
  document.querySelectorAll('.src-btn').forEach((b, j) => b.classList.toggle('on', j === i));
  ld.classList.remove('off');
  ld.querySelector('.spin').style.display = 'block';
  ldT.textContent = `Conectando a ${LABELS[i]||'fonte '+(i+1)}…`;
  ldS.textContent = 'Aguarde alguns segundos';
  const rb = ld.querySelector('.retry');
  if (rb) rb.remove();

  // Carrega o iframe
  fr.src = 'about:blank';
  setTimeout(() => { fr.src = SRCS[i]; }, 80);

  /* Estratégia de detecção:
     - onload dispara SEMPRE (mesmo em páginas de erro ou bloqueio)
     - Se der SecurityError ao tentar acessar contentDocument → cross-origin → carregou algo
     - Se não der erro → mesmo domínio ou about:blank → provavelmente vazio/erro
     - Timeout de 10s como fallback
  */
  fr.onload = () => {
    checking = true;
    clearTimeout(timer);
    let ok = false;
    try {
      // Tenta acessar o documento do iframe
      const doc = fr.contentDocument || fr.contentWindow?.document;
      const html = doc?.documentElement?.innerHTML || '';
      // Se chegou aqui: ou é about:blank, ou same-origin com conteúdo
      ok = html.length > 500 && !html.includes('</body></html>\n') && html !== '<head></head><body></body>';
    } catch (e) {
      // SecurityError = conteúdo cross-origin foi carregado = SUCESSO
      ok = e.name === 'SecurityError' || e instanceof DOMException;
    }

    if (ok) {
      success();
    } else {
      // Iframe vazio ou bloqueou: espera mais 3s antes de desistir
      timer = setTimeout(() => {
        let ok2 = false;
        try {
          const doc = fr.contentDocument || fr.contentWindow?.document;
          ok2 = (doc?.documentElement?.innerHTML?.length || 0) > 500;
        } catch(e) { ok2 = true; }
        ok2 ? success() : load(i + 1);
      }, 3000);
    }
    checking = false;
  };

  fr.onerror = () => { clearTimeout(timer); load(i + 1); };

  // Timeout principal: 10s
  timer = setTimeout(() => {
    let ok = false;
    try {
      const doc = fr.contentDocument || fr.contentWindow?.document;
      ok = (doc?.documentElement?.innerHTML?.length || 0) > 500;
    } catch(e) { ok = true; }
    ok ? success() : load(i + 1);
  }, 10000);
}

function success() {
  clearTimeout(timer);
  ldT.textContent = '▶ Reproduzindo';
  ldS.textContent = '';
  ld.querySelector('.spin').style.display = 'none';
  setTimeout(() => ld.classList.add('off'), 800);
}

function fail() {
  ld.querySelector('.spin').style.display = 'none';
  ldT.textContent = '😔 Nenhuma fonte disponível';
  ldS.textContent = 'Este conteúdo não está disponível agora.\nTente mais tarde ou escolha outro.';
  if (!ld.querySelector('.retry')) {
    const btn = document.createElement('button');
    btn.className = 'retry';
    btn.textContent = 'Tentar novamente';
    btn.onclick = () => load(0);
    ld.appendChild(btn);
  }
}

// Inicia
if (ID) load(0);
else { ldT.textContent = 'ID não informado'; ldS.textContent = ''; }
</script>
</body>
</html>
