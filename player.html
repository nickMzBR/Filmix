<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Filmix Player</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#000;color:#fff;font-family:sans-serif;overflow:hidden}
body{display:flex;flex-direction:column}

/* BARRA TOPO */
.top{display:flex;align-items:center;gap:12px;padding:10px 16px;background:#0a0a0a;border-bottom:1px solid #1a1a1a;flex-shrink:0;z-index:50}
.back{display:flex;align-items:center;gap:6px;padding:7px 14px;background:#1e1e1e;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:.2s;flex-shrink:0}
.back:hover{background:#2563eb}
.logo{font-size:18px;font-weight:700;letter-spacing:2px;flex-shrink:0}.logo span{color:#2563eb}
.ttl{font-size:13px;color:#aaa;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* BARRA DE IDIOMA */
.lang-bar{display:flex;align-items:center;gap:6px;padding:7px 16px;background:#0d0d0d;border-bottom:1px solid #161616;flex-shrink:0}
.lang-lbl{font-size:10px;font-weight:700;letter-spacing:1px;color:#444;flex-shrink:0}
.lang-btn{padding:4px 12px;border-radius:5px;font-size:12px;font-weight:600;border:1px solid #2a2a2a;color:#555;background:transparent;cursor:pointer;transition:.15s;flex-shrink:0}
.lang-btn:hover{border-color:#2563eb;color:#fff}
.lang-btn.on{background:#2563eb;border-color:#2563eb;color:#fff}
.lang-sep{width:1px;height:16px;background:#2a2a2a;margin:0 4px}

/* ÁREA DO PLAYER */
.pw{flex:1;position:relative;background:#000;overflow:hidden}
#fr{position:absolute;inset:0;width:100%;height:100%;border:none;z-index:1}

/* LOADING */
.ld{position:absolute;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:10;transition:opacity .5s;padding:24px;text-align:center}
.ld.off{opacity:0;pointer-events:none}
.spin{width:46px;height:46px;border-radius:50%;border:3px solid #1e1e1e;border-top-color:#2563eb;animation:sp .9s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.ld-t{font-size:15px;font-weight:600;color:#ccc}
.ld-s{font-size:12px;color:#555;line-height:1.6;max-width:280px}
.ld-retry{padding:9px 22px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;margin-top:4px}
.ld-retry:hover{background:#1d4ed8}
.ld-note{font-size:11px;color:#333;margin-top:4px;line-height:1.5;max-width:300px}
</style>
</head>
<body>

<div class="top">
  <button class="back" onclick="history.back()">← Voltar</button>
  <div class="logo"><span>F</span>ILMIX</div>
  <span class="ttl" id="ttl"></span>
</div>

<div class="lang-bar">
  <span class="lang-lbl">IDIOMA:</span>
  <button class="lang-btn on" onclick="setLang('pt',this)">🇧🇷 Português</button>
  <button class="lang-btn" onclick="setLang('en',this)">🇺🇸 Inglês</button>
  <button class="lang-btn" onclick="setLang('es',this)">🇪🇸 Espanhol</button>
  <div class="lang-sep"></div>
  <span class="lang-lbl">LEGENDA:</span>
  <button class="lang-btn on" id="subPt" onclick="setSub('pt',this)">PT</button>
  <button class="lang-btn" id="subEn" onclick="setSub('en',this)">EN</button>
  <button class="lang-btn" id="subOff" onclick="setSub('off',this)">OFF</button>
</div>

<div class="pw">
  <div class="ld" id="ld">
    <div class="spin" id="spin"></div>
    <div class="ld-t" id="ldT">Carregando…</div>
    <div class="ld-s" id="ldS">Conectando ao servidor de vídeo</div>
  </div>
  <iframe id="fr"
    allowfullscreen
    allow="autoplay; fullscreen; picture-in-picture; encrypted-media; gyroscope; accelerometer"
    referrerpolicy="no-referrer"
    sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-presentation allow-top-navigation-by-user-activation allow-modals">
  </iframe>
</div>

<script>
const q     = new URLSearchParams(location.search);
const ID    = q.get('id')    || '';
const TYPE  = q.get('type')  || 'movie';
const SEA   = q.get('sea')   || '1';
const EP    = q.get('ep')    || '1';
const TITLE = q.get('title') || '';

document.getElementById('ttl').textContent = TITLE;
document.title = '▶ ' + TITLE + ' — Filmix';

const fr   = document.getElementById('fr');
const ld   = document.getElementById('ld');
const ldT  = document.getElementById('ldT');
const ldS  = document.getElementById('ldS');
const spin = document.getElementById('spin');

let lang = 'pt', sub = 'pt';
let loadTimer = null;

// Bloqueia popups
window.open = () => null;
window.addEventListener('blur', () => setTimeout(() => window.focus?.(), 50));

function getUrl(l, s) {
  // AutoEmbed suporta lang e legenda via parâmetros
  const subParam = s === 'off' ? '' : `&sub_lang=${s}`;
  if (TYPE === 'tv') {
    return `https://autoembed.co/tv/tmdb/${ID}-${SEA}-${EP}?lang=${l}${subParam}`;
  }
  return `https://autoembed.co/movie/tmdb/${ID}?lang=${l}${subParam}`;
}

function load() {
  clearTimeout(loadTimer);
  spin.style.display = 'block';
  ld.classList.remove('off');
  // Remove botão de retry se existir
  ld.querySelector('.ld-retry')?.remove();
  ld.querySelector('.ld-note')?.remove();

  ldT.textContent = 'Carregando…';
  ldS.textContent = 'Conectando ao servidor de vídeo';

  fr.src = 'about:blank';

  setTimeout(() => {
    fr.src = getUrl(lang, sub);
  }, 150);

  fr.onload = checkLoad;
  fr.onerror = fail;

  // Timeout: 20s
  loadTimer = setTimeout(checkLoad, 20000);
}

function checkLoad() {
  clearTimeout(loadTimer);
  let ok = false;
  try {
    // Se acessar contentDocument sem erro = same-origin (about:blank ou erro)
    const doc = fr.contentDocument || fr.contentWindow?.document;
    const len = doc?.documentElement?.innerHTML?.length || 0;
    // Se for > 1000 chars = tem conteúdo real
    ok = len > 1000;
  } catch(e) {
    // SecurityError = conteúdo cross-origin carregado = SUCESSO
    ok = true;
  }

  if (ok) {
    success();
  } else {
    // Espera mais 3s e tenta de novo
    loadTimer = setTimeout(() => {
      let ok2 = false;
      try {
        const doc = fr.contentDocument || fr.contentWindow?.document;
        ok2 = (doc?.documentElement?.innerHTML?.length || 0) > 1000;
      } catch(e) { ok2 = true; }
      ok2 ? success() : fail();
    }, 3000);
  }
}

function success() {
  clearTimeout(loadTimer);
  spin.style.display = 'none';
  ldT.textContent = '▶ Reproduzindo';
  ldS.textContent = '';
  setTimeout(() => ld.classList.add('off'), 600);
}

function fail() {
  clearTimeout(loadTimer);
  spin.style.display = 'none';
  ldT.textContent = '😔 Não disponível';
  ldS.textContent = 'Este título pode não estar disponível no momento. Títulos populares têm maior cobertura.';

  if (!ld.querySelector('.ld-retry')) {
    const btn = document.createElement('button');
    btn.className = 'ld-retry';
    btn.textContent = 'Tentar novamente';
    btn.onclick = load;
    ld.appendChild(btn);
  }
}

window.setLang = function(l, el) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => {
    if (['pt','en','es'].includes(b.textContent.replace(/[^a-z]/gi,'').toLowerCase().trim().slice(-2))) {
      b.classList.remove('on');
    }
  });
  // Marca apenas o botão de idioma clicado
  document.querySelectorAll('.lang-btn').forEach(b => {
    if (b.onclick?.toString().includes(`'${l}'`)) b.classList.add('on');
  });
  el.classList.add('on');
  load();
};

window.setSub = function(s, el) {
  sub = s;
  document.querySelectorAll('#subPt,#subEn,#subOff').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
  load();
};

if (ID) load();
else { spin.style.display='none'; ldT.textContent='ID não informado'; ldS.textContent=''; }
</script>
</body>
</html>
