<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Filmix Player</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#000;color:#fff;font-family:sans-serif;overflow:hidden}
body{display:flex;flex-direction:column}

.top{display:flex;align-items:center;gap:12px;padding:10px 18px;background:#0a0a0a;border-bottom:1px solid #1a1a1a;flex-shrink:0;z-index:100;position:relative}
.back{display:flex;align-items:center;gap:6px;padding:7px 14px;background:#1e1e1e;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:.2s;flex-shrink:0}
.back:hover{background:#2563eb}
.logo{font-size:18px;font-weight:700;letter-spacing:2px;flex-shrink:0}.logo span{color:#2563eb}
.ttl{font-size:14px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#ccc}

/* Container do player */
.pw{flex:1;position:relative;background:#000;overflow:hidden}

/* iframe fica abaixo de tudo */
#fr{position:absolute;inset:0;width:100%;height:100%;border:none;z-index:1;pointer-events:none}

/* Camada de proteção contra anúncios — fica sobre o iframe
   Permite arrastar para controlar, mas bloqueia popups */
#shield{
  position:absolute;inset:0;z-index:2;
  background:transparent;
  cursor:pointer;
  /* Deixa passar eventos de vídeo mas não popups */
  -webkit-user-select:none;user-select:none;
}

/* Controles customizados que aparecem sobre o shield */
#controls{
  position:absolute;bottom:0;left:0;right:0;z-index:3;
  background:linear-gradient(transparent,rgba(0,0,0,.85));
  padding:40px 20px 16px;
  display:flex;align-items:center;gap:14px;
  opacity:0;transition:opacity .3s;
  pointer-events:none;
}
#controls.show{opacity:1;pointer-events:all}

.ctrl-btn{
  width:40px;height:40px;border-radius:50%;
  background:rgba(255,255,255,.15);backdrop-filter:blur(6px);
  border:none;color:#fff;font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:.2s;flex-shrink:0;
}
.ctrl-btn:hover{background:rgba(37,99,235,.8)}

/* Barra de progresso */
.prog-wrap{flex:1;display:flex;flex-direction:column;gap:6px}
.prog-bar{height:4px;background:rgba(255,255,255,.2);border-radius:2px;cursor:pointer;position:relative}
.prog-fill{height:100%;background:#2563eb;border-radius:2px;width:0%;transition:width .5s linear;pointer-events:none}
.time-txt{font-size:11px;color:rgba(255,255,255,.6);font-variant-numeric:tabular-nums}

/* Botão de tela cheia */
.fs-btn{width:36px;height:36px;border-radius:8px;background:rgba(255,255,255,.1);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s;flex-shrink:0}
.fs-btn:hover{background:rgba(37,99,235,.8)}

/* OVERLAY de loading */
.ov{position:absolute;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:10;transition:opacity .5s;padding:24px;text-align:center}
.ov.hide{opacity:0;pointer-events:none}
.ring{width:52px;height:52px;border-radius:50%;border:3px solid #1e1e1e;border-top-color:#2563eb;animation:spin .9s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.stxt{font-size:15px;font-weight:600;color:#ccc}
.sdesc{font-size:12px;color:#555}
.pbar{width:200px;height:3px;background:#1e1e1e;border-radius:2px;overflow:hidden}
.pbar-fill{height:100%;background:#2563eb;border-radius:2px;transition:width .4s}

.err-box{display:none;flex-direction:column;align-items:center;gap:14px}
.err-ico{font-size:44px}
.err-ttl{font-size:18px;font-weight:700}
.err-sub{font-size:13px;color:#555;max-width:300px;line-height:1.6}
.retry-btn{padding:10px 24px;background:#2563eb;color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer}
.retry-btn:hover{background:#1d4ed8}

/* Aviso de proteção ativa */
#ad-block-notice{
  position:absolute;top:10px;right:10px;z-index:4;
  background:rgba(37,99,235,.9);color:#fff;
  font-size:11px;font-weight:600;padding:5px 10px;border-radius:6px;
  opacity:0;transition:opacity .3s;pointer-events:none;
}
#ad-block-notice.show{opacity:1}
</style>
</head>
<body>

<div class="top">
  <button class="back" onclick="history.back()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m15 18-6-6 6-6"/></svg>
    Voltar
  </button>
  <div class="logo"><span>F</span>ILMIX</div>
  <span class="ttl" id="ttl">Carregando…</span>
</div>

<div class="pw" id="pw">
  <!-- Loading overlay -->
  <div class="ov" id="ov">
    <div id="loadSt" style="display:flex;flex-direction:column;align-items:center;gap:16px">
      <div class="ring"></div>
      <div class="stxt" id="stxt">Carregando filme…</div>
      <div class="sdesc" id="sdesc">Buscando melhor fonte disponível</div>
      <div class="pbar"><div class="pbar-fill" id="pbarFill" style="width:0%"></div></div>
    </div>
    <div class="err-box" id="errSt">
      <div class="err-ico">😔</div>
      <div class="err-ttl">Indisponível no momento</div>
      <div class="err-sub">Não conseguimos carregar este filme agora. Tente novamente ou escolha outro.</div>
      <button class="retry-btn" onclick="loadMovie()">Tentar novamente</button>
    </div>
  </div>

  <!-- IFRAME do player -->
  <iframe id="fr" allowfullscreen
    allow="autoplay; fullscreen; picture-in-picture; encrypted-media; gyroscope; accelerometer"
    referrerpolicy="no-referrer">
  </iframe>

  <!-- ESCUDO anti-anúncio: intercepta todos os cliques ANTES do iframe -->
  <div id="shield"></div>

  <!-- Aviso rápido quando bloqueia redirect -->
  <div id="ad-block-notice">🛡️ Anúncio bloqueado</div>

  <!-- Controles do player -->
  <div id="controls">
    <button class="ctrl-btn" id="playBtn" title="Play/Pause">⏸</button>
    <div class="prog-wrap">
      <div class="prog-bar" id="progBar">
        <div class="prog-fill" id="progFill"></div>
      </div>
      <span class="time-txt" id="timeTxt">Reproduzindo</span>
    </div>
    <button class="fs-btn" id="fsBtn" title="Tela cheia">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
      </svg>
    </button>
  </div>
</div>

<script>
// ── Parâmetros ──────────────────────────────────
const params = new URLSearchParams(location.search);
const ID    = params.get('id');
const TITLE = params.get('title') || 'Filme';

document.getElementById('ttl').textContent   = TITLE;
document.title = '▶ ' + TITLE + ' — Filmix';

// ── Elementos ───────────────────────────────────
const fr       = document.getElementById('fr');
const shield   = document.getElementById('shield');
const controls = document.getElementById('controls');
const ov       = document.getElementById('ov');
const loadSt   = document.getElementById('loadSt');
const errSt    = document.getElementById('errSt');
const stxt     = document.getElementById('stxt');
const sdesc    = document.getElementById('sdesc');
const pbarFill = document.getElementById('pbarFill');
const playBtn  = document.getElementById('playBtn');
const progFill = document.getElementById('progFill');
const timeTxt  = document.getElementById('timeTxt');
const fsBtn    = document.getElementById('fsBtn');
const notice   = document.getElementById('ad-block-notice');
const pw       = document.getElementById('pw');

// ── Anti-anúncio ────────────────────────────────
// Bloqueia qualquer tentativa de abrir nova janela/aba
const _open = window.open;
window.open = function(url, target, features) {
  // Bloqueia silenciosamente
  showAdBlocked();
  return null;
};

// Bloqueia redirecionamentos de top-level via beforeunload / click no shield
let playerReady = false;
shield.addEventListener('click', (e) => {
  e.preventDefault();
  e.stopPropagation();
  // Toggle controles ao clicar
  toggleControls();
});

// Bloqueia popups que tentam navegar o frame pai
window.addEventListener('message', (e) => {
  const data = e.data;
  if (typeof data === 'string') {
    if (data.includes('redirect') || data.includes('open')) {
      showAdBlocked();
      return;
    }
  }
  // Mensagem legítima do player = está funcionando
  if (playerReady) return;
  playerReady = true;
  success();
});

// Intercepta tentativas de mudar location via iframe
let locationChangeBlocked = false;
window.addEventListener('beforeunload', (e) => {
  if (playerReady && !locationChangeBlocked) {
    e.preventDefault();
    e.returnValue = '';
    showAdBlocked();
    return '';
  }
});

function showAdBlocked() {
  notice.classList.add('show');
  setTimeout(() => notice.classList.remove('show'), 2000);
}

// ── Controles ───────────────────────────────────
let ctrlTimer = null;
let ctrlVisible = false;
let paused = false;
let elapsed = 0;
let elapsedTimer = null;

function toggleControls() {
  ctrlVisible = !ctrlVisible;
  controls.classList.toggle('show', ctrlVisible);
  clearTimeout(ctrlTimer);
  if (ctrlVisible) {
    ctrlTimer = setTimeout(() => {
      controls.classList.remove('show');
      ctrlVisible = false;
    }, 4000);
  }
}

// Play/pause — controla via postMessage para o iframe
playBtn.addEventListener('click', () => {
  paused = !paused;
  playBtn.textContent = paused ? '▶' : '⏸';
  try {
    fr.contentWindow.postMessage(paused ? 'pause' : 'play', '*');
  } catch(e) {}
});

// Tela cheia
fsBtn.addEventListener('click', () => {
  const el = pw;
  if (!document.fullscreenElement) {
    el.requestFullscreen?.() || el.webkitRequestFullscreen?.();
  } else {
    document.exitFullscreen?.() || document.webkitExitFullscreen?.();
  }
});

// Barra de progresso simulada (não temos acesso ao tempo real do iframe)
function startProgress() {
  clearInterval(elapsedTimer);
  elapsed = 0;
  elapsedTimer = setInterval(() => {
    if (!paused) {
      elapsed++;
      // Simula progresso (não temos acesso real ao tempo do vídeo)
      const fakeTotal = 7200; // assume 2h
      const pct = Math.min((elapsed / fakeTotal) * 100, 99);
      progFill.style.width = pct + '%';
      const m = Math.floor(elapsed / 60);
      const s = elapsed % 60;
      timeTxt.textContent = `${m}:${s.toString().padStart(2,'0')} assistindo`;
    }
  }, 1000);
}

// ── Carregamento ────────────────────────────────
function setProgress(pct, txt, sub) {
  pbarFill.style.width = pct + '%';
  if (txt) stxt.textContent = txt;
  if (sub !== undefined) sdesc.textContent = sub;
}

function success() {
  setProgress(100, 'Reproduzindo!', '');
  // Ativa o iframe para receber eventos de scroll/teclado mas não cliques que causam popup
  fr.style.pointerEvents = 'none'; // mantém desabilitado
  setTimeout(() => {
    ov.classList.add('hide');
    startProgress();
  }, 800);
}

function showErr() {
  loadSt.style.display = 'none';
  errSt.style.display  = 'flex';
}

async function loadMovie() {
  if (!ID) { stxt.textContent = 'ID inválido'; return; }
  playerReady = false;
  loadSt.style.display = 'flex';
  errSt.style.display  = 'none';
  ov.classList.remove('hide');
  fr.src = 'about:blank';

  setProgress(15, 'Buscando fonte…', 'Conectando ao servidor');

  setTimeout(() => setProgress(40, 'Carregando…', 'Preparando player'), 800);
  setTimeout(() => setProgress(65, 'Carregando…', 'Quase pronto'), 2500);

  fr.src = '/api/proxy?id=' + ID;

  fr.onload = () => {
    try {
      const doc = fr.contentDocument;
      const body = doc?.body?.innerHTML || '';
      if (body.includes('indisponível') || body.length < 300) {
        showErr();
      } else {
        playerReady = true;
        success();
      }
    } catch(e) {
      // SecurityError = conteúdo externo = sucesso
      playerReady = true;
      success();
    }
  };

  fr.onerror = () => showErr();

  // Timeout de segurança
  setTimeout(() => {
    if (ov.classList.contains('hide')) return;
    try {
      const doc = fr.contentDocument;
      if (!doc || (doc.body?.innerHTML?.length || 0) < 300) showErr();
      else { playerReady = true; success(); }
    } catch(e) {
      playerReady = true;
      success();
    }
  }, 18000);
}

// Inicia
if (ID) loadMovie();
else stxt.textContent = 'Filme não encontrado';
</script>
</body>
</html>
