<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Filmix Player</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#000;color:#fff;font-family:sans-serif;overflow:hidden}
body{display:flex;flex-direction:column}
.top{display:flex;align-items:center;gap:12px;padding:10px 18px;background:#0a0a0a;border-bottom:1px solid #1a1a1a;flex-shrink:0}
.back{display:flex;align-items:center;gap:6px;padding:7px 14px;background:#1e1e1e;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:.2s;flex-shrink:0}
.back:hover{background:#2563eb}
.logo{font-size:18px;font-weight:700;letter-spacing:2px;flex-shrink:0}.logo span{color:#2563eb}
.ttl{font-size:14px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#ccc}
.pw{flex:1;position:relative;background:#000}
iframe{position:absolute;inset:0;width:100%;height:100%;border:none;z-index:1}
.ov{position:absolute;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:5;transition:opacity .5s;padding:24px;text-align:center}
.ov.hide{opacity:0;pointer-events:none}
.ring{width:52px;height:52px;border-radius:50%;border:3px solid #1e1e1e;border-top-color:#2563eb;animation:spin .9s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.stxt{font-size:15px;font-weight:600;color:#ccc}
.sdesc{font-size:12px;color:#555}
.bar{width:200px;height:3px;background:#1e1e1e;border-radius:2px;overflow:hidden}
.bar-fill{height:100%;background:#2563eb;border-radius:2px;transition:width .4s ease}
.err-box{display:none;flex-direction:column;align-items:center;gap:14px}
.err-ico{font-size:44px}
.err-ttl{font-size:18px;font-weight:700}
.err-sub{font-size:13px;color:#555;max-width:300px;line-height:1.6}
.retry-btn{padding:10px 24px;background:#2563eb;color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer}
.retry-btn:hover{background:#1d4ed8}
</style>
</head>
<body>
<div class="top">
  <button class="back" onclick="history.back()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m15 18-6-6 6-6"/></svg>
    Voltar
  </button>
  <div class="logo"><span>F</span>ILMIX</div>
  <span class="ttl" id="ttl">Carregando…</span>
</div>
<div class="pw">
  <div class="ov" id="ov">
    <div id="loadState" style="display:flex;flex-direction:column;align-items:center;gap:16px">
      <div class="ring"></div>
      <div class="stxt" id="stxt">Carregando filme…</div>
      <div class="sdesc" id="sdesc">Buscando melhor fonte disponível</div>
      <div class="bar"><div class="bar-fill" id="barFill" style="width:0%"></div></div>
    </div>
    <div class="err-box" id="errState">
      <div class="err-ico">😔</div>
      <div class="err-ttl">Indisponível no momento</div>
      <div class="err-sub">Não conseguimos carregar este filme agora. Tente novamente ou escolha outro.</div>
      <button class="retry-btn" onclick="load()">Tentar novamente</button>
    </div>
  </div>
  <iframe id="fr" allowfullscreen
    allow="autoplay; fullscreen; picture-in-picture; encrypted-media; gyroscope; accelerometer"
    referrerpolicy="no-referrer">
  </iframe>
</div>
<script>
const p = new URLSearchParams(location.search);
const ID = p.get('id');
const TITLE = p.get('title') || 'Filme';

document.getElementById('ttl').textContent = TITLE;
document.title = '▶ ' + TITLE + ' — Filmix';

const fr       = document.getElementById('fr');
const ov       = document.getElementById('ov');
const stxt     = document.getElementById('stxt');
const sdesc    = document.getElementById('sdesc');
const barFill  = document.getElementById('barFill');
const loadSt   = document.getElementById('loadState');
const errSt    = document.getElementById('errState');

function setProgress(pct, txt, sub) {
  barFill.style.width = pct + '%';
  if (txt) stxt.textContent = txt;
  if (sub !== undefined) sdesc.textContent = sub;
}

function showErr() {
  loadSt.style.display = 'none';
  errSt.style.display = 'flex';
}

function success() {
  setProgress(100, 'Reproduzindo!', '');
  setTimeout(() => ov.classList.add('hide'), 1000);
}

async function load() {
  if (!ID) { stxt.textContent = 'ID inválido'; return; }

  loadSt.style.display = 'flex';
  errSt.style.display = 'none';
  ov.classList.remove('hide');
  fr.src = 'about:blank';

  setProgress(10, 'Buscando fonte…', 'Conectando ao servidor');

  try {
    // Usa o proxy da Vercel que remove os bloqueios server-side
    const proxyUrl = '/api/proxy?id=' + ID;

    setProgress(40, 'Carregando…', 'Preparando player');

    fr.src = proxyUrl;

    // Detecta carregamento do iframe
    fr.onload = () => {
      try {
        // Se consegue acessar = página de erro do proxy (same-origin)
        const doc = fr.contentDocument;
        const body = doc?.body?.innerHTML || '';
        if (body.includes('indisponível') || body.length < 200) {
          showErr();
        } else {
          success();
        }
      } catch(e) {
        // SecurityError = conteúdo externo carregado = sucesso
        success();
      }
    };

    fr.onerror = () => showErr();

    // Timeout de segurança
    setTimeout(() => {
      if (!ov.classList.contains('hide')) {
        try {
          const doc = fr.contentDocument;
          if (!doc || doc.body?.innerHTML?.length < 200) showErr();
          else success();
        } catch(e) {
          success(); // cross-origin = carregou
        }
      }
    }, 15000);

    setProgress(70, 'Carregando…', 'Quase lá');

  } catch(e) {
    showErr();
  }
}

if (ID) load();
else { stxt.textContent = 'Filme não encontrado'; sdesc.textContent = ''; }
</script>
</body>
</html>
